<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>2026 CBA全明星周末 - 专属球星卡</title>
    <script src="https://cdn.staticfile.net/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        /* ================= 1. 全局与字体设置 ================= */
        :root {
            /* 适配 402x874 大屏的卡片尺寸 */
            --card-w: 260px;  
            --card-h: 460px;
        }

        @font-face {
            font-family: 'PlayerNumberFont';
            src: url('fonts/number.ttf'); /* 设计师自行替换字体文件 */
        }
        @font-face {
            font-family: 'PlayerNameFont';
            src: url('fonts/name.otf'); /* 设计师自行替换字体文件 */
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background: #000; overflow: hidden; font-family: -apple-system, sans-serif;
            touch-action: none; /* 防止页面整体跟着手指滑动 */
        }

        /* 页面容器基础样式：默认隐藏，激活时显示 */
        .page {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: none; flex-direction: column; justify-content: center; align-items: center;
            opacity: 0; transition: opacity 0.5s ease;
        }
        .page.active {
            display: flex; opacity: 1; z-index: 10;
        }

        /* 通用按钮样式 */
        .btn { 
            padding: 15px 40px; border-radius: 30px; background: #e63946; 
            color: white; border: none; font-size: 16px; font-weight: bold; 
            margin-top: 20px; transition: 0.3s; cursor: pointer; box-shadow: 0 4px 15px rgba(230,57,70,0.4);
        }
        .btn:disabled { background: #555; color: #888; box-shadow: none; cursor: not-allowed; }
        .btn-outline { background: transparent; border: 1px solid white; box-shadow: none; }

        /* ================= 2. 各页面 UI 设计 ================= */
        
        /* 【P1】预加载页 */
        #page-loading { background: url('img/bg-loading.jpg') center/cover no-repeat; background-color: #111; }
        .loading-text { color: white; margin-top: 50vh; font-size: 14px; letter-spacing: 2px; margin-bottom: 10px; }
        .progress-bar-container { width: 60%; height: 6px; background: rgba(255,255,255,0.2); border-radius: 3px; overflow: hidden; }
        .progress-bar { height: 100%; width: 0%; background: #e63946; transition: width 0.1s; }

        /* 【P2】选择页 */
        #page-select { background: #111; color: white; }
        #page-select h2 { margin-bottom: 40px; letter-spacing: 2px; }
        .select-box { 
            width: 80%; padding: 15px; margin: 10px 0; font-size: 16px; 
            border-radius: 8px; border: 1px solid #444; background: #222; color: white; outline: none;
        }

        /* 【P3】过渡页 */
        #page-transition { background: #000; color: white; text-align: center; }
        .trans-item { opacity: 0; transform: translateY(50px); transition: all 0.8s ease; margin: 15px 0; }
        .trans-item.show { opacity: 1; transform: translateY(0); }
        #trans-number { font-family: 'PlayerNumberFont', sans-serif; font-size: 90px; color: #e63946; font-style: italic; }
        #trans-name { font-family: 'PlayerNameFont', sans-serif; font-size: 45px; letter-spacing: 4px; }

        /* 【P4 & P5】球员展示页 (合并场景切换) */
        #page-showcase { background: #000; overflow: hidden; perspective: 1000px;}
        .bg-layer { position: absolute; width: 120%; height: 120%; background: url('img/bg-showcase.jpg') center/cover no-repeat; z-index: 1; transition: transform 0.1s; background-color: #222;}
        .player-layer { position: absolute; height: 85vh; bottom: 0; z-index: 2; transition: all 0.8s cubic-bezier(0.25, 1, 0.5, 1); transform-origin: bottom center; }
        
        /* 呼吸引导圆点 */
        .breathing-circle {
            position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%);
            width: 70px; height: 70px; background: rgba(230,57,70,0.5); border-radius: 50%;
            z-index: 3; animation: breathe 2s infinite; cursor: pointer; border: 2px solid rgba(255,255,255,0.8);
        }
        @keyframes breathe { 0% { transform: translate(-50%, -50%) scale(0.8); opacity: 0.5; } 50% { transform: translate(-50%, -50%) scale(1.1); opacity: 1; } 100% { transform: translate(-50%, -50%) scale(0.8); opacity: 0.5; } }
        
        /* 放大为半身照状态 */
        .showcase-zoomed .player-layer { transform: scale(1.4) translateY(12vh); }
        .showcase-zoomed .breathing-circle { display: none; }
        
        /* 底部信息块 */
        .info-panel {
            position: absolute; bottom: -100%; width: 100%; height: 40vh;
            background: linear-gradient(to top, rgba(0,0,0,1) 50%, rgba(0,0,0,0.8) 80%, transparent);
            z-index: 4; display: flex; flex-direction: column; justify-content: flex-end; align-items: center; padding-bottom: 40px;
            transition: bottom 0.6s ease;
        }
        .showcase-zoomed .info-panel { bottom: 0; }
        .info-logo { width: 70px; margin-bottom: 10px; }
        .info-text { color: white; font-family: 'PlayerNameFont', sans-serif; font-size: 28px; margin-bottom: 25px; letter-spacing: 2px;}
        .button-group { display: flex; gap: 15px; }

        /* 【P6】开包页 (适配大屏) */
        #page-unbox { background: #0a0a0a; }
        .pack-container { position: relative; width: 300px; height: 500px; }
        .pack-top { 
            position: absolute; top:0; width: 100%; height: 90px; 
            background-color: #444; background-image: url('img/pack-top.png'); background-size: cover; background-position: center; 
            z-index: 2; transition: 0.8s cubic-bezier(0.68, -0.55, 0.265, 1.55); transform-origin: left bottom; cursor: pointer;
        }
        .pack-body { 
            position: absolute; top:90px; width: 100%; height: 410px; 
            background-color: #333; background-image: url('img/pack-body.png'); background-size: cover; background-position: center; 
            z-index: 1; transition: 0.8s ease-in;
        }
        
        /* 撕开后的飞走动画 */
        .pack-opened .pack-top { transform: rotate(-25deg) translate(120%, -150%); opacity: 0; }
        .pack-opened .pack-body { transform: translateY(120%); opacity: 0; }
        
        /* 横滑提示 */
        .swipe-guide { position: absolute; top: 40px; left: 50%; transform: translateX(-50%); color: rgba(255,255,255,0.8); font-size: 14px; z-index: 3; pointer-events: none; text-shadow: 1px 1px 4px rgba(0,0,0,0.8);}
        .swipe-guide::before { content: "➔ 横向划开"; }

        /* 【P7】球星卡互动页 */
        #page-card { perspective: 1200px; background: #000;}
        .card-bg-layer { position: absolute; width: 120%; height: 120%; background: url('img/bg-card.jpg') center/cover no-repeat; z-index: 1; background-color: #1a1a1a;}
        .final-card-container { width: var(--card-w); height: var(--card-h); transform-style: preserve-3d; z-index: 2; transition: transform 0.1s ease-out; }
        .final-card { width: 100%; height: 100%; background-color: #222; background-image: url('img/card-front.png'); background-size: cover; background-position: center; border-radius: 15px; box-shadow: 0 30px 60px rgba(0,0,0,0.9); }
        .save-btn-container { position: absolute; bottom: 60px; z-index: 3; }

        /* 【P8】保存海报页 */
        #page-poster { background: rgba(0,0,0,0.95); z-index: 999; }
        #result-img { max-width: 80%; border-radius: 15px; margin-bottom: 30px; box-shadow: 0 10px 40px rgba(0,0,0,0.8); }
        .hint { color: #fff; animation: breathe 1.5s infinite; font-size: 15px; letter-spacing: 2px;}

    </style>
</head>
<body>

<div id="app">
    <div class="page active" id="page-loading">
        <div class="loading-text">正在载入 2026 CBA 全明星周末专属数据...</div>
        <div class="progress-bar-container"><div class="progress-bar" id="load-progress"></div></div>
    </div>

    <div class="page" id="page-select">
        <h2>定制你的星锐时刻</h2>
        <select id="team-select" class="select-box">
            <option value="">-- 请选择所属球队 --</option>
        </select>
        <select id="player-select" class="select-box" disabled>
            <option value="">-- 请先选择球队 --</option>
        </select>
        <button id="confirm-btn" class="btn" disabled>确认生成</button>
    </div>

    <div class="page" id="page-transition">
        <img id="trans-logo" class="trans-item" src="" alt="logo" style="width: 120px;">
        <div id="trans-number" class="trans-item"></div>
        <div id="trans-name" class="trans-item"></div>
    </div>

    <div class="page" id="page-showcase">
        <div class="bg-layer" id="showcase-bg"></div>
        <img class="player-layer" id="showcase-player" src="img/player-fullbody.png" alt="[球员全身像]">
        <div class="breathing-circle" id="zoom-trigger"></div>
        
        <div class="info-panel">
            <img class="info-logo" id="info-logo" src="" alt="[Logo]">
            <div class="info-text"><span id="info-number"></span> <span id="info-name"></span></div>
            <div class="button-group">
                <button class="btn btn-outline" onclick="goToPage('page-select')">重新选择</button>
                <button class="btn" onclick="goToPage('page-unbox')">生成专属球星卡</button>
            </div>
        </div>
    </div>

    <div class="page" id="page-unbox">
        <div class="pack-container" id="pack-wrapper">
            <div class="pack-top" id="pack-top">
                <div class="swipe-guide"></div>
            </div>
            <div class="pack-body"></div>
        </div>
    </div>

    <div class="page" id="page-card">
        <div class="card-bg-layer" id="card-bg"></div>
        <div class="final-card-container" id="final-card-container">
            <div class="final-card" id="card-element"></div>
        </div>
        <div class="save-btn-container">
            <button class="btn" onclick="generatePoster()">保存球星卡海报</button>
        </div>
    </div>

    <div class="page" id="page-poster">
        <img id="result-img" src="" alt="专属球星卡">
        <div class="hint">👆长按上方图片保存至相册</div>
        <button class="btn btn-outline" style="margin-top:30px;" onclick="goToPage('page-card')">返回互动</button>
    </div>
</div>

<script>
    /* ================= 数据库模拟 (供测试用) ================= */
    const db = {
        'beijing': { 
            teamName: '北京首钢', logo: 'img/logo-beijing.png',
            players: [{ id: 'bj1', name: '方硕', number: '8' }, { id: 'bj2', name: '翟晓川', number: '20' }]
        },
        'guangdong': {
            teamName: '广东宏远', logo: 'img/logo-guangdong.png',
            players: [{ id: 'gd1', name: '胡明轩', number: '3' }, { id: 'gd2', name: '徐杰', number: '2' }]
        }
    };

    let selectedTeam = '';
    let selectedPlayer = null;

    /* ================= 页面路由控制 ================= */
    function goToPage(pageId) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(pageId).classList.add('active');
        
        // 进入特定页面的触发逻辑
        if(pageId === 'page-transition') playTransition();
        if(pageId === 'page-showcase') initGyroscope('showcase-bg', 'showcase-player', 25);
        if(pageId === 'page-card') initGyroscope('card-bg', 'final-card-container', 35);
    }

    /* ================= P1: 模拟进度条加载 ================= */
    let progress = 0;
    const loadInterval = setInterval(() => {
        progress += 4;
        document.getElementById('load-progress').style.width = progress + '%';
        if(progress >= 100) {
            clearInterval(loadInterval);
            setTimeout(() => goToPage('page-select'), 500);
        }
    }, 80);

    /* ================= P2: 级联下拉菜单逻辑 ================= */
    const teamSel = document.getElementById('team-select');
    const playerSel = document.getElementById('player-select');
    const confirmBtn = document.getElementById('confirm-btn');

    // 载入球队选项
    for(let key in db) { teamSel.options.add(new Option(db[key].teamName, key)); }

    teamSel.addEventListener('change', (e) => {
        selectedTeam = e.target.value;
        playerSel.innerHTML = '<option value="">-- 请选择球员 --</option>';
        if(selectedTeam) {
            playerSel.disabled = false;
            db[selectedTeam].players.forEach(p => playerSel.options.add(new Option(p.name, p.id)));
        } else {
            playerSel.disabled = true; confirmBtn.disabled = true;
        }
    });

    playerSel.addEventListener('change', (e) => {
        confirmBtn.disabled = !e.target.value;
        if(e.target.value) {
            selectedPlayer = db[selectedTeam].players.find(p => p.id === e.target.value);
        }
    });

    confirmBtn.addEventListener('click', () => goToPage('page-transition'));

    /* ================= P3: 逐层浮现过渡动画 ================= */
    function playTransition() {
        document.getElementById('trans-logo').src = db[selectedTeam].logo;
        document.getElementById('trans-number').innerText = '#' + selectedPlayer.number;
        document.getElementById('trans-name').innerText = selectedPlayer.name;

        const items = document.querySelectorAll('.trans-item');
        items.forEach(item => item.classList.remove('show'));

        setTimeout(() => items[0].classList.add('show'), 400);
        setTimeout(() => items[1].classList.add('show'), 1200);
        setTimeout(() => items[2].classList.add('show'), 2000);
        
        setTimeout(() => {
            // 同步信息到 P4/P5 的半身照面板
            document.getElementById('info-logo').src = db[selectedTeam].logo;
            document.getElementById('info-number').innerText = '#' + selectedPlayer.number;
            document.getElementById('info-name').innerText = selectedPlayer.name;
            document.getElementById('page-showcase').classList.remove('showcase-zoomed'); // 重置为全身
            goToPage('page-showcase');
        }, 3500);
    }

    /* ================= P4&P5: 呼吸点点击与视差缩放 ================= */
    document.getElementById('zoom-trigger').addEventListener('click', () => {
        document.getElementById('page-showcase').classList.add('showcase-zoomed');
    });

    /* ================= 全局：手指触摸滑动模拟陀螺仪视差 ================= */
    // 设计师注：微信中直接获取重力感应往往会被系统拦截，所以用触屏反向移动是最流畅的商业解法
    function initGyroscope(bgId, fgId, intensity) {
        const bg = document.getElementById(bgId);
        const fg = document.getElementById(fgId);
        
        const handleMove = (e) => {
            const touch = e.touches ? e.touches[0] : e;
            const x = (touch.clientX / window.innerWidth - 0.5) * intensity;
            const y = (touch.clientY / window.innerHeight - 0.5) * intensity;
            
            if(bg) bg.style.transform = `translate(${x}px, ${y}px)`; // 背景顺向移动
            
            if(fg && fgId.includes('container')) {
                // 卡片 3D 旋转
                fg.style.transform = `rotateY(${x * 1.5}deg) rotateX(${-y * 1.5}deg) scale(1.05)`; 
            } else if (fg) {
                // 人物反向位移产生景深错觉
                if(!document.getElementById('page-showcase').classList.contains('showcase-zoomed')) {
                    fg.style.transform = `translate(${-x}px, ${-y}px)`; 
                }
            }
        };

        const handleReset = () => {
            if(fg && fgId.includes('container')) fg.style.transform = `rotateY(0deg) rotateX(0deg) scale(1)`;
        };

        document.addEventListener('touchmove', handleMove);
        document.addEventListener('touchend', handleReset);
        // 兼容电脑鼠标测试
        document.addEventListener('mousemove', handleMove);
        document.addEventListener('mouseleave', handleReset);
    }

    /* ================= P6: 划开卡包顶部 ================= */
    const packTop = document.getElementById('pack-top');
    const packWrapper = document.getElementById('pack-wrapper');
    let startX = 0; let isDragging = false;

    const startDrag = (e) => { isDragging = true; startX = e.touches ? e.touches[0].clientX : e.clientX; };
    const endDrag = (e) => {
        if(!isDragging) return;
        isDragging = false;
        let endX = e.changedTouches ? e.changedTouches[0].clientX : e.clientX;
        if(endX - startX > 50) { // 横滑超过 50px 触发开包
            packWrapper.classList.add('pack-opened');
            setTimeout(() => goToPage('page-card'), 1000); // 飞走动画播放完后切换页面
        }
    };

    packTop.addEventListener('touchstart', startDrag); packTop.addEventListener('touchend', endDrag);
    packTop.addEventListener('mousedown', startDrag); window.addEventListener('mouseup', endDrag);

    /* ================= P8: 生成静态海报 ================= */
    function generatePoster() {
        const cardContainer = document.getElementById('final-card-container');
        // 强制归正卡片角度，防止截图歪斜
        cardContainer.style.transform = 'rotateX(0deg) rotateY(0deg) scale(1)'; 
        
        setTimeout(() => {
            html2canvas(document.getElementById('card-element'), { 
                scale: 2, // 2倍高清截图 
                backgroundColor: null,
                useCORS: true // 允许跨域图片资源
            }).then(canvas => {
                document.getElementById('result-img').src = canvas.toDataURL('image/png');
                goToPage('page-poster');
            });
        }, 250); // 留出一点点时间让 CSS 动画归位
    }

</script>
</body>
</html>
